<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tariff Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

    <!-- Welcome -->
    <div id="welcome-screen">
        <h1>Tariff Game</h1>
        <p>You are a country choosing trade policy over 10 rounds.</p>

        <h3>Payoff Matrix</h3>
        <table>
            <tr><th></th><th>Partner Low</th><th>Partner High</th></tr>
            <tr><td>Your Low</td><td>8, 8</td><td>0, 10</td></tr>
            <tr><td>Your High</td><td>10, 0</td><td>4, 4</td></tr>
        </table>

        <button onclick="goToPartnerSelection()">Start Game</button>
    </div>

    <!-- Partner Selection -->
    <div id="partner-screen" class="hidden">
        <h2>Select Trading Partner</h2>
        <button onclick="selectPartner('stochastic')">Stochastic</button>
        <button onclick="selectPartner('cooperative')">Cooperative</button>
        <button onclick="selectPartner('winner')">Dr. Winner</button>
    </div>

    <!-- Game -->
    <div id="game-screen" class="hidden">
        <h2 id="partner-name"></h2>
        <p id="round-info"></p>
        <p>Your Total Score: <span id="score">0</span></p>

        <div id="action-buttons">
            <button onclick="playRound('Low')">Low Tariff</button>
            <button onclick="playRound('High')">High Tariff</button>
        </div>

        <div id="result"></div>

        <!-- End Controls (same page) -->
        <div id="end-controls" class="hidden">
            <p><strong>All 10 rounds completed.</strong></p>
            <p>Your Final Total Score: <span id="final-score-inline"></span></p>
            <button onclick="restart()">Play Again</button>
        </div>

        <h3>History</h3>
        <table id="history-table">
            <tr>
                <th>Round</th>
                <th>You</th>
                <th>Partner</th>
                <th>Your Payoff</th>
                <th>Total</th>
            </tr>
        </table>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
